            'soul_stained_steel_plating': { name: 'Soul Steel Plating', yield: 2, inputs: [{ id: 'soul_stained_steel_ingot', qty: 1 }, { id: 'soul_stained_steel_nugget', qty: 4 }] },
            'soul_stained_steel_ingot': { name: 'Soul Steel Ingot', inputs: [{ id: 'processed_soulstone', qty: 4 }, { id: 'wicked_spirit', qty: 3 }, { id: 'arcane_spirit', qty: 1 }, { id: 'earthen_spirit', qty: 1 }] },
            'soul_stained_steel_nugget': { name: 'Soul Steel Nugget', yield: 9, inputs: [{ id: 'soul_stained_steel_ingot', qty: 1 }] },
            'golden_brilliance': { name: 'Golden Brilliance', inputs: [{ id: 'golden_ascendance_plate', qty: 1 }, { id: 'experience_block', qty: 4 }] },
            'golden_ascendance_plate': { name: 'Golden Ascendance Plate', yield: 9, inputs: [{ id: 'golden_ascendance_block', qty: 1 }] },
            'golden_ascendance_block': { name: 'Golden Ascendance Block', inputs: [{ id: 'ascendant_block', qty: 1 }, { id: 'gold_block', qty: 8 }] },
            'iron_block': { name: 'Iron Block', inputs: [{ id: 'iron_ingot', qty: 9 }] }
        };

        const ITEMS_DATA = {
            'arcane_essence': { name: 'Arcane Essence', unit: 'mb', color: 'text-purple-400' },
            'lava': { name: 'Lava', unit: 'mb', color: 'text-orange-500' },
            'harmonic_essence': { name: 'Harmonic Essence', unit: 'mb', color: 'text-indigo-300' },
            'pure_vitae': { name: 'Pure Vitae', unit: 'mb', color: 'text-cyan-300' },
            'cursed_vitae': { name: 'Cursed Vitae', unit: 'mb', color: 'text-rose-700' },
            'runic_sap': { name: 'Runic Sap', unit: 'un', color: 'text-cyan-400' },
            'iron_ingot': { name: 'Iron Ingot', unit: 'un', color: 'text-zinc-400' },
            'gold_ingot': { name: 'Gold Ingot', unit: 'un', color: 'text-yellow-500' },
            'netherite_scrap': { name: 'Netherite Scrap', unit: 'un', color: 'text-neutral-500' },
            'netherrack': { name: 'Netherrack', unit: 'un', color: 'text-red-800' },
            'arcane_log': { name: 'Arcane Log', unit: 'un', color: 'text-emerald-900' },
            'hex_ash': { name: 'Hex Ash', unit: 'un', color: 'text-pink-300' },
            'arcane_pebble': { name: 'Arcane Pebble', unit: 'un', color: 'text-purple-200' },
            'processed_soulstone': { name: 'Soulstone', unit: 'un', color: 'text-blue-400' },
            'infernal_spirit': { name: 'Infernal Spirit', unit: 'un', color: 'text-red-500' },
            'arcane_spirit': { name: 'Arcane Spirit', unit: 'un', color: 'text-purple-500' },
            'earthen_spirit': { name: 'Earthen Spirit', unit: 'un', color: 'text-yellow-700' },
            'eldritch_spirit': { name: 'Eldritch Spirit', unit: 'un', color: 'text-indigo-600' },
            'aerial_spirit': { name: 'Aerial Spirit', unit: 'un', color: 'text-blue-200' },
            'aqueous_spirit': { name: 'Aqueous Spirit', unit: 'un', color: 'text-sky-400' },
            'sagrado_spirit': { name: 'Sacred Spirit', unit: 'un', color: 'text-yellow-200' },
            'wicked_spirit': { name: 'Wicked Spirit', unit: 'un', color: 'text-pink-600' },
            'blaze_powder': { name: 'Blaze Powder', unit: 'un', color: 'text-orange-400' },
            'brass_ingot': { name: 'Brass Ingot', unit: 'un', color: 'text-yellow-600' },
            'obsidian': { name: 'Obsidian', unit: 'un', color: 'text-purple-900' },
            'redstone': { name: 'Redstone', unit: 'un', color: 'text-red-600' },
            'null_slate': { name: 'Null Slate', unit: 'un', color: 'text-zinc-600' },
            'void_salt': { name: 'Void Salt', unit: 'un', color: 'text-blue-200' },
            'diamond': { name: 'Diamond', unit: 'un', color: 'text-sky-300' },
            'condensed_runic_sap': { name: 'Condensed Runic Sap', unit: 'un', color: 'text-cyan-400' },
            'condensed_cursed_sap': { name: 'Condensed Cursed Sap', unit: 'un', color: 'text-emerald-700' },
            'quartz': { name: 'Quartz', unit: 'un', color: 'text-zinc-100' },
            'gold_block': { name: 'Gold Block', unit: 'un', color: 'text-yellow-400' },
            'sand': { name: 'Sand', unit: 'un', color: 'text-orange-200' },
            'paper': { name: 'Paper', unit: 'un', color: 'text-white' },
            'experience_block': { name: 'XP Block', unit: 'un', color: 'text-green-400' },
            'mana_upgrade_orb': { name: 'Mana Orb', unit: 'un', color: 'text-rose-500' },
            'adamantite_plate': { name: 'Adamantite Plate', unit: 'un', color: 'text-rose-300' },
            'netherite_smithing_template': { name: 'Netherite Template', unit: 'un', color: 'text-zinc-700' }
        };

        function App() {
            const [viewMode, setViewMode] = useState('calc');
            const [targetItem, setTargetItem] = useState('adamantite_heart_template');
            const [quantityInput, setQuantityInput] = useState('1');
            const [ancestralChance, setAncestralChance] = useState(77);
            const [arcaneReturnChance, setArcaneReturnChance] = useState(75);
            const [useCheapCraft, setUseCheapCraft] = useState(false);
            const [completedItems, setCompletedItems] = useState(new Set());

            const quantity = Math.max(0, parseInt(quantityInput) || 0);

            const totals = useMemo(() => {
                const results = {};
                const surplusPool = {};

                function calculate(itemId, requiredQty, parentName = null) {
                    if (requiredQty <= 0.0001) return;

                    const availableInSurplus = surplusPool[itemId] || 0;
                    const takenFromSurplus = Math.min(requiredQty, availableInSurplus);
                    let needed = requiredQty - takenFromSurplus;
                    surplusPool[itemId] = Math.max(0, availableInSurplus - takenFromSurplus);

                    if (completedItems.has(itemId)) needed = 0;

                    if (!results[itemId]) {
                        results[itemId] = { net: 0, gross: 0, isResource: false, requestedBy: new Set() };
                    }
                    results[itemId].net += needed;
                    results[itemId].gross += requiredQty;
                    if (parentName) results[itemId].requestedBy.add(parentName);

                    if (needed <= 0.0001) return;

                    const recipe = RECIPES[itemId];
                    if (!recipe) {
                        results[itemId].isResource = true;
                        return;
                    }

                    const yieldPerCraft = recipe.yield || 1;
                    let probFactor = 1;
                    if (itemId === 'ancestral_ingot') probFactor = 1 / (ancestralChance / 100);
                    else if (recipe.useArcaneReturn) probFactor = (100 - arcaneReturnChance) / 100;
                    else if (recipe.chance) probFactor = 1 / recipe.chance;

                    const numCrafts = Math.ceil(needed / (yieldPerCraft / probFactor));
                    const totalProduced = numCrafts * yieldPerCraft;
                    
                    const leftOver = totalProduced - (needed * probFactor);
                    if (leftOver > 0.001) surplusPool[itemId] = (surplusPool[itemId] || 0) + leftOver;

                    // LÓGICA PROGRESSIVA SMART
                    const isSubTemplate = itemId.endsWith('_template') && itemId !== targetItem;
                    const inputs = (recipe.cheapInputs && (useCheapCraft || isSubTemplate)) ? recipe.cheapInputs : recipe.inputs;

                    inputs.forEach(input => {
                        let inputQty = numCrafts * input.qty;
                        calculate(input.id, inputQty, recipe.name);
                    });
                }

                calculate(targetItem, quantity);
                return { items: results, surplus: surplusPool };
            }, [targetItem, quantity, ancestralChance, arcaneReturnChance, completedItems, useCheapCraft]);

            const sortedRaw = Object.entries(totals.items).filter(([id]) => !RECIPES[id]).sort((a,b) => b[1].net - a[1].net);
            const sortedInter = Object.entries(totals.items).filter(([id]) => RECIPES[id] && id !== targetItem).sort((a,b) => b[1].net - a[1].net);

            return (
                <div className="min-h-screen p-4 max-w-5xl mx-auto">
                    <header className="mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-zinc-800 pb-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-violet-600 p-1.5 rounded shadow-lg shadow-purple-900/20"><Icon name="Calculator" className="text-white w-5 h-5" /></div>
                            <h1 className="text-lg font-black uppercase tracking-tight italic leading-none">Tenebris <span className="text-violet-500 text-sm block sm:inline">Fabricator</span></h1>
                        </div>
                        <nav className="flex bg-zinc-900 p-1 rounded-lg border border-zinc-800 flex-wrap justify-center">
                            {['calc', 'surplus', 'recipes'].map(m => (
                                <button key={m} onClick={() => setViewMode(m)} className={"px-4 py-1.5 rounded-md text-[9px] font-bold uppercase transition-all " + (viewMode === m ? "bg-violet-600 text-white" : "text-zinc-500 hover:text-zinc-300")}>
                                    {m === 'calc' ? 'Painel' : m === 'surplus' ? 'Sobras' : 'Guia'}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {viewMode === 'calc' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <aside className="lg:col-span-4 space-y-4">
                                <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800 space-y-4 shadow-xl">
                                    <div>
                                        <label className="text-[9px] font-black text-zinc-500 uppercase mb-1 block tracking-widest">Alvo de Crafting</label>
                                        <select value={targetItem} onChange={(e) => setTargetItem(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-md p-2 text-xs font-bold outline-none focus:border-violet-500">
                                            <optgroup label="Ingots & Elite Mats">
                                                {Object.entries(RECIPES).filter(([_, r]) => r.tier && !['Templates', 'Armor'].includes(r.tier)).sort((a,b) => a[1].tier.localeCompare(b[1].tier)).map(([id, r]) => <option key={id} value={id}>{r.name} ({r.tier})</option>)}
                                                <option value="soulbound_adamantite">Soulbound Adamantite (Elite)</option>
                                                <option value="stellarforge_component">Stellarforge Component (Elite)</option>
                                            </optgroup>
                                            <optgroup label="Armors & Gear">
                                                {Object.entries(RECIPES).filter(([_, r]) => r.tier === 'Armor').map(([id, r]) => <option key={id} value={id}>{r.name}</option>)}
                                            </optgroup>
                                            <optgroup label="Equipment (Templates)">
                                                {Object.entries(RECIPES).filter(([_, r]) => r.tier === 'Templates').map(([id, r]) => <option key={id} value={id}>{r.name}</option>)}
                                            </optgroup>
                                            <optgroup label="Standard Metals">
                                                {Object.entries(RECIPES).filter(([_, r]) => ['Arcane', 'Ancestral', 'Ascendant', 'Esoteric', 'Mithril'].includes(r.tier)).map(([id, r]) => <option key={id} value={id}>{r.name} ({r.tier})</option>)}
                                            </optgroup>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-zinc-500 uppercase mb-1 block tracking-widest">Quantidade</label>
                                        <input type="text" value={quantityInput} onChange={(e) => setQuantityInput(e.target.value.replace(/[^0-9]/g, ''))} className="w-full bg-zinc-950 border border-zinc-800 rounded-md p-2 text-lg font-mono font-black text-violet-400 outline-none" />
                                    </div>
                                    
                                    <div className="pt-4 border-t border-zinc-800 space-y-4">
                                        <div className="flex items-center justify-between group cursor-pointer" onClick={() => setUseCheapCraft(!useCheapCraft)}>
                                            <div className="flex items-center gap-2">
                                                <Icon name="Copy" className={useCheapCraft ? "text-violet-400" : "text-zinc-600"} />
                                                <span className="text-[9px] font-black uppercase text-zinc-400">Modo Duplicação Global</span>
                                            </div>
                                            <div className={"w-8 h-4 rounded-full relative transition-all duration-200 " + (useCheapCraft ? "bg-violet-600" : "bg-zinc-800")}>
                                                <div className={"absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all duration-200 " + (useCheapCraft ? "left-[1.25rem]" : "left-0.5")} />
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            <div className="flex justify-between text-[9px] font-black uppercase text-zinc-500"><span>Ancestral Success</span><span className="text-violet-400">{ancestralChance}%</span></div>
                                            <input type="range" min="50" max="100" value={ancestralChance} onChange={(e) => setAncestralChance(e.target.value)} className="w-full h-1 bg-zinc-800 rounded-lg appearance-none" />
                                            <div className="flex justify-between text-[9px] font-black uppercase text-zinc-500"><span>Return Rate</span><span className="text-violet-400">{arcaneReturnChance}%</span></div>
                                            <input type="range" min="0" max="100" value={arcaneReturnChance} onChange={(e) => setArcaneReturnChance(e.target.value)} className="w-full h-1 bg-zinc-800 rounded-lg appearance-none" />
                                        </div>
                                    </div>

                                    <button onClick={() => setCompletedItems(new Set())} className="w-full py-2 bg-zinc-800 text-zinc-500 rounded-md text-[9px] font-black uppercase flex items-center justify-center gap-2 hover:bg-zinc-700 hover:text-zinc-300 transition-all"><Icon name="RefreshCcw" /> Limpar Checklist</button>
                                </div>
                                <div className="p-3 bg-blue-900/10 border border-blue-500/20 rounded-lg">
                                    <p className="text-[8px] font-bold uppercase text-blue-400 flex items-center gap-1.5 mb-1"><Icon name="Search" /> Progressão Inteligente</p>
                                    <p className="text-[9px] text-blue-200/60 leading-relaxed italic">Componentes de níveis anteriores (como templates de mithril) são calculados no modo barato automaticamente.</p>
                                </div>
                            </aside>

                            <main className="lg:col-span-8 space-y-6">
                                <section>
                                    <h2 className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="Database" className="text-purple-500" /> Recursos Base</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        {sortedRaw.map(([id, d]) => (
                                            <div key={id} className={"p-2.5 rounded-lg flex flex-col justify-center card-base " + (d.net <= 0 ? "bg-emerald-500/5 border-emerald-500/20 opacity-40" : "bg-zinc-900 border-zinc-800")}>
                                                <div className="flex items-center justify-between mb-1">
                                                    <div className="flex items-center gap-2.5 overflow-hidden w-full">
                                                        <button onClick={() => {const n = new Set(completedItems); n.has(id) ? n.delete(id) : n.add(id); setCompletedItems(n);}} className={"p-1 rounded border shrink-0 " + (completedItems.has(id) ? "bg-emerald-600 border-emerald-600" : "border-zinc-700")}><Icon name="Check" className={completedItems.has(id) ? "text-white" : "text-transparent"} /></button>
                                                        <div className="truncate flex-grow">
                                                            <p className={"text-[9px] font-bold truncate " + (ITEMS_DATA[id]?.color || "")}>{ITEMS_DATA[id]?.name || id}</p>
                                                            <p className="text-[12px] font-mono font-black text-white">{d.net <= 0 ? 'OK' : Math.ceil(d.net).toLocaleString()} <span className="text-[7px] text-zinc-500 font-bold uppercase">{ITEMS_DATA[id]?.unit || 'un'}</span></p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex flex-wrap gap-1 mt-1 border-t border-zinc-800 pt-1.5 opacity-60">
                                                    {[...d.requestedBy].map((p, i) => <span key={i} className="lineage-tag">{p}</span>)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h2 className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="Layers" className="text-indigo-500" /> Processamento</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        {sortedInter.map(([id, d]) => (
                                            <div key={id} className={"p-2.5 rounded-lg flex flex-col justify-center card-base " + (d.net <= 0 ? "bg-emerald-500/5 border-emerald-500/20 opacity-40" : "bg-zinc-900 border-zinc-800")}>
                                                <div className="flex items-center justify-between mb-1">
                                                    <div className="flex items-center gap-2.5 overflow-hidden w-full">
                                                        <button onClick={() => {const n = new Set(completedItems); n.has(id) ? n.delete(id) : n.add(id); setCompletedItems(n);}} className={"p-1 rounded border shrink-0 " + (completedItems.has(id) ? "bg-emerald-600 border-emerald-600" : "border-zinc-700")}><Icon name="Check" className={completedItems.has(id) ? "text-white" : "text-transparent"} /></button>
                                                        <div className="truncate flex-grow">
                                                            <p className="text-[9px] font-bold text-zinc-400 truncate tracking-tight">{RECIPES[id]?.name || id}</p>
                                                            <p className="text-[12px] font-mono font-black text-white">{d.net <= 0 ? 'OK' : Math.ceil(d.net).toLocaleString()} <span className="text-[7px] text-zinc-500 font-bold uppercase">{ITEMS_DATA[id]?.unit || 'un'}</span></p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex flex-wrap gap-1 mt-1 border-t border-zinc-800 pt-1.5 opacity-60">
                                                    {[...d.requestedBy].map((p, i) => <span key={i} className="lineage-tag">{p}</span>)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </main>
                        </div>
                    ) : viewMode === 'surplus' ? (
                        <div className="bg-zinc-900/50 p-6 rounded-xl border border-zinc-800">
                            <h2 className="text-sm font-black uppercase italic mb-6 tracking-tight flex items-center gap-2 tracking-widest text-emerald-500"><Icon name="Plus" /> Sobras do Processamento</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                {Object.entries(totals.surplus).filter(([_, q]) => q > 0.01).sort((a,b) => b[1]-a[1]).map(([id, qty]) => (
                                    <div key={id} className="p-3 rounded-lg bg-zinc-950 border border-zinc-800 flex justify-between items-center group">
                                        <div className="overflow-hidden">
                                            <p className="text-[7px] font-black text-zinc-600 uppercase tracking-widest truncate">{RECIPES[id]?.tier || 'SUB-ITEM'}</p>
                                            <p className="text-[10px] font-bold text-zinc-200 truncate">{RECIPES[id]?.name || ITEMS_DATA[id]?.name || id}</p>
                                        </div>
                                        <p className="text-lg font-mono font-black text-emerald-500 ml-2">+{Math.floor(qty)}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                            {Object.entries(RECIPES).filter(([_, r]) => r.tier).sort((a,b) => a[1].tier.localeCompare(b[1].tier)).map(([id, r]) => (
                                <div key={id} className="bg-zinc-900/40 p-3 rounded-lg border border-zinc-800 flex flex-col h-full card-base">
                                    <div className="flex justify-between items-center mb-2"><h3 className="text-[9px] font-black text-zinc-100 uppercase tracking-tight italic">{r.name}</h3><span className="text-[6px] bg-violet-500/10 text-violet-400 px-1 py-0.5 rounded font-black uppercase">{r.tier}</span></div>
                                    <div className="space-y-1 flex-grow">{r.inputs.map((i, idx) => <div key={idx} className="flex justify-between text-[8px] text-zinc-500 border-b border-zinc-800/30 pb-0.5 last:border-0"><span>{ITEMS_DATA[i.id]?.name || RECIPES[i.id]?.name || i.id}</span><span className="font-bold text-zinc-400">{i.qty} {ITEMS_DATA[i.id]?.unit || 'un'}</span></div>)}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
