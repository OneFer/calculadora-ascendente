<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Ascendente/Ancestral</title>
<style>
    :root {
        --bg-color: #121212;
        --text-color: #ffffff;
        --card-color: #1e1e1e;
        --accent-color: #bb86fc;
    }
    [data-theme="light"] {
        --bg-color: #f5f5f5;
        --text-color: #000000;
        --card-color: #ffffff;
        --accent-color: #6200ea;
    }
    [data-theme="blue"] {
        --bg-color: #0d1b2a;
        --text-color: #e0e1dd;
        --card-color: #1b263b;
        --accent-color: #415a77;
    }
    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        min-height: 100vh;
        background-size: cover;
        background-position: center;
    }
    .container {
        background-color: var(--card-color);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        max-width: 500px;
        width: 90%;
    }
    h1 {
        text-align: center;
        color: var(--accent-color);
    }
    label, input, select {
        display: block;
        margin: 10px 0;
        width: 100%;
    }
    button {
        background-color: var(--accent-color);
        border: none;
        padding: 10px;
        color: white;
        cursor: pointer;
        border-radius: 8px;
        width: 100%;
    }
    .theme-switcher {
        margin-bottom: 20px;
    }
</style>
</head>
<body data-theme="dark">
<div class="container">
    <h1>Calculadora Ascendente/Ancestral</h1>
    <div class="theme-switcher">
        <label for="theme">Tema:</label>
        <select id="theme">
            <option value="dark">Escuro</option>
            <option value="light">Claro</option>
            <option value="blue">Azul</option>
        </select>
    </div>
    <label for="tipo">Tipo de item:</label>
    <select id="tipo">
        <option value="ascendente">Ascendente</option>
        <option value="ancestral">Ancestral</option>
    </select>
    <label for="quantidade">Quantidade desejada:</label>
    <input type="number" id="quantidade" value="1" min="1">

    <label for="chance">Chance de sucesso (%):</label>
    <input type="range" id="chance" min="50" max="100" value="75" step="1">
    <span id="chanceValor">75%</span>

    <button onclick="calcular()">Calcular Recursos</button>

    <div id="resultado"></div>
</div>

<script>
    const themeSelect = document.getElementById('theme');
    themeSelect.addEventListener('change', () => {
        document.body.setAttribute('data-theme', themeSelect.value);
    });

    document.getElementById('chance').addEventListener('input', function() {
        document.getElementById('chanceValor').innerText = this.value + "%";
    });

    function calcular() {
        const tipo = document.getElementById('tipo').value;
        const quantidade = parseInt(document.getElementById('quantidade').value);
        const chance = parseInt(document.getElementById('chance').value) / 100;

        let recursos = {};

        if (tipo === "ancestral") {
            let ingotsNecessarios = quantidade * 1;
            let tentativas = Math.ceil(ingotsNecessarios / chance);
            recursos = {
                "Arcane Ingots": tentativas,
                "Arcane Spirit": tentativas * 8,
                "Earthen Spirit": tentativas * 8,
                "Infernal Spirit": tentativas * 8
            };
        } else if (tipo === "ascendente") {
            let blocosNecessarios = quantidade;
            let ingotsNecessarios = blocosNecessarios * 9;
            let tentativas = Math.ceil(ingotsNecessarios / chance);
            recursos = {
                "Arcane Ingots": tentativas,
                "Arcane Spirit": tentativas * 8 + blocosNecessarios * 24,
                "Earthen Spirit": tentativas * 8 + blocosNecessarios * 16,
                "Infernal Spirit": tentativas * 8 + blocosNecessarios * 16,
                "Eldritch Spirit": blocosNecessarios * 24,
                "Sagrado Spirit": blocosNecessarios * 16,
                "Soul Stained Steel Plating": blocosNecessarios * 24,
                "Void Salt": blocosNecessarios * 16,
                "Null Void": blocosNecessarios * 16,
                "Blaze Powder": blocosNecessarios * 24,
                "Null Slate": blocosNecessarios * 16
            };
        }

        let html = "<h2>Recursos Necessários</h2><ul>";
        for (let [item, qtd] of Object.entries(recursos)) {
            html += `<li><strong>${item}:</strong> ${qtd.toLocaleString()}</li>`;
        }
        html += "</ul>";

        document.getElementById('resultado').innerHTML = html;
    }
</script>
</body>
</html>
